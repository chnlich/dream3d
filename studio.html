<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dream3d — studio</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      /* Author display rules below would otherwise override the UA `hidden` behavior on flex
         containers, so make `hidden` authoritative for every element. */
      [hidden] {
        display: none !important;
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f5f7fa;
      }
      header.controls {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #ffffff;
        border-bottom: 1px solid #e1e5ea;
      }
      input,
      select,
      button {
        font: inherit;
      }
      input,
      select {
        padding: 6px 8px;
        border: 1px solid #c7ccd1;
        border-radius: 6px;
      }
      #prompt {
        flex: 1 1 auto;
        min-width: 0;
      }
      .preset-label {
        font-size: 13px;
        color: #52606d;
        white-space: nowrap;
      }
      button {
        padding: 6px 14px;
        border: 1px solid #c7ccd1;
        border-radius: 6px;
        background: #f0f2f5;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: #e4e7eb;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #generate {
        background: #2563eb;
        border-color: #2563eb;
        color: #ffffff;
      }
      .status {
        margin-left: 4px;
        max-width: 30vw;
        color: #52606d;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .banner {
        flex: 0 0 auto;
        padding: 8px 12px;
        background: #fff4e5;
        border-bottom: 1px solid #f0c98a;
        color: #8a5a00;
        font-size: 13px;
      }
      main {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }
      #viewer {
        flex: 1 1 auto;
        display: block;
        min-width: 0;
        height: 100%;
      }
      .panel {
        flex: 0 0 300px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-left: 1px solid #e1e5ea;
        background: #ffffff;
      }
      .stepper {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #e1e5ea;
      }
      #pass-label {
        flex: 1 1 auto;
        text-align: center;
        font-size: 13px;
      }
      .panel-title {
        flex: 0 0 auto;
        margin: 0;
        padding: 10px 12px 4px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #7b8794;
      }
      /* Live generation log. Shares the panel's vertical space with the object list (both grow
         equally and scroll independently); during a run the empty list yields most of it to the log. */
      .log {
        flex: 1 1 0;
        min-height: 0;
        overflow-y: auto;
        margin: 0;
        padding: 0 12px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        color: #3e4c59;
      }
      .object-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        margin: 0;
        padding: 0 12px 12px;
        list-style: none;
      }
      .object-list li {
        padding: 8px 0;
        border-bottom: 1px solid #eef1f4;
        font-size: 13px;
      }
      .object-list .empty {
        padding: 8px 0;
        color: #9aa5b1;
        font-style: italic;
      }
      .row-title {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
      }
      .row-title code {
        padding: 1px 5px;
        border-radius: 4px;
        background: #eef1f4;
      }
      .row-url {
        margin-top: 2px;
        color: #7b8794;
        font-size: 12px;
        word-break: break-all;
      }
      .badge {
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge-ready {
        background: #d3f9d8;
        color: #2b8a3e;
      }
      .badge-pending {
        background: #fff3bf;
        color: #997404;
      }
      .badge-failed {
        background: #ffe3e3;
        color: #c92a2a;
      }
      .progress-panel {
        flex: 0 0 auto;
        padding: 12px;
        border-bottom: 1px solid #e1e5ea;
      }
      .progress-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .progress-run-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #7b8794;
      }
      .run-id {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        background: #eef1f4;
        padding: 2px 6px;
        border-radius: 4px;
        color: #1f2933;
      }
      #copy-run-id {
        padding: 2px 8px;
        font-size: 12px;
      }
      .progress-bar-bg {
        height: 8px;
        background: #e4e7eb;
        border-radius: 4px;
        overflow: hidden;
        margin: 8px 0;
      }
      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #2563eb;
        border-radius: 4px;
        transition: width 0.25s ease;
      }
      .progress-bar-fill.error {
        background: #c92a2a;
      }
      .progress-bar-fill.cached {
        background: #2b8a3e;
      }
      .progress-meta {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #52606d;
        margin-bottom: 8px;
      }
      .stage-list {
        list-style: none;
        margin: 0;
        padding: 0;
        font-size: 12px;
      }
      .stage-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 0;
        color: #7b8794;
      }
      .stage-row.stage-state-running {
        color: #1f2933;
        font-weight: 600;
      }
      .stage-row.stage-state-done {
        color: #2b8a3e;
      }
      .stage-row.stage-state-failed {
        color: #c92a2a;
      }
      .stage-icon {
        flex: 0 0 14px;
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }
      .stage-icon.spinner {
        border: 2px solid #e4e7eb;
        border-top-color: #2563eb;
        animation: stage-spin 1s linear infinite;
      }
      .stage-icon.pending {
        color: #c7ccd1;
      }
      .stage-icon.done {
        color: #2b8a3e;
      }
      .stage-icon.failed {
        color: #c92a2a;
      }
      @keyframes stage-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .stage-name {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .stage-time {
        flex: 0 0 auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: #9aa5b1;
      }
      .stage-row.stage-state-running .stage-time {
        color: #2563eb;
      }
      .stage-row.stage-state-done .stage-time {
        color: #2b8a3e;
      }
      .stage-row.stage-state-failed .stage-time {
        color: #c92a2a;
      }
      .badge-cached {
        background: #d3f9d8;
        color: #2b8a3e;
      }
      /* Generate button "Generating…" cue: an always-visible inline spinner covering the
         plan phase and the brief cached-hit flash. */
      #generate.loading::before {
        content: "";
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 6px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: stage-spin 0.8s linear infinite;
        vertical-align: -2px;
      }
    </style>
  </head>
  <body>
    <header class="controls">
      <input id="prompt" type="text" placeholder="Describe a scene…" list="prompt-options" autocomplete="off" />
      <datalist id="prompt-options"></datalist>
      <label class="preset-label">
        Amend rounds
        <input id="amend-rounds" type="number" min="0" max="5" value="2" />
      </label>
      <button id="generate">Generate</button>
      <span id="status" class="status"></span>
    </header>

    <div id="banner" class="banner" hidden></div>

    <main>
      <canvas id="viewer"></canvas>
      <aside class="panel">
        <div id="progress-panel" class="progress-panel" hidden>
          <div class="progress-header">
            <span class="progress-run-label">Run ID</span>
            <code id="run-id" class="run-id"></code>
            <button id="copy-run-id" type="button" title="Copy Run ID">Copy</button>
            <span id="cached-badge" class="badge badge-cached" hidden>Cached</span>
          </div>
          <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
          </div>
          <div class="progress-meta">
            <span id="elapsed">Elapsed: 0s</span>
          </div>
          <ul id="stage-list" class="stage-list"></ul>
        </div>
        <div id="stepper" class="stepper" hidden>
          <button id="prev" disabled>Prev</button>
          <span id="pass-label">Pass 0 / 0</span>
          <button id="next" disabled>Next</button>
        </div>
        <h2 class="panel-title">Log</h2>
        <pre id="log" class="log"></pre>
        <h2 class="panel-title">Objects</h2>
        <ul id="object-list" class="object-list"></ul>
      </aside>
    </main>

    <script type="module" src="/src/studioMain.ts"></script>
  </body>
</html>
